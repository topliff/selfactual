# Nginx vhost for vocab.selfactual.ai
# Serves the SelfActual vocabulary ontology (sa.ttl).
# Prerequisite: DNS A record for vocab.selfactual.ai → 52.32.95.140

server {
    server_name vocab.selfactual.ai;

    root /var/www/vocab;

    # Serve sa.ttl as default for the root namespace URI
    location = / {
        default_type text/turtle;
        try_files /sa.ttl =404;

        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    # Content negotiation: JSON-LD requests get redirected (future)
    location / {
        default_type text/turtle;
        try_files $uri /sa.ttl =404;

        # JSON-LD content negotiation (serve JSON-LD when available)
        if ($http_accept ~* "application/ld\+json") {
            rewrite ^ /sa.jsonld last;
        }

        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/vocab.selfactual.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocab.selfactual.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = vocab.selfactual.ai) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name vocab.selfactual.ai;
    return 404;
}
